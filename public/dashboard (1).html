<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Receptionist Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a18;
      --muted: #6b6b67;
      --blue: #378ADD;
      --blue-light: #E6F1FB;
      --green: #3B6D11;
      --green-light: #EAF3DE;
      --amber: #BA7517;
      --amber-light: #FAEEDA;
      --red: #A32D2D;
      --red-light: #FCEBEB;
      --teal: #0F6E56;
      --teal-light: #E1F5EE;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 15px; font-weight: 600; color: var(--text); }
    .logo span { color: var(--blue); }
    .client-select {
      font-size: 13px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    .live-badge {
      display: flex; align-items: center;
      font-size: 11px; font-weight: 500;
      background: var(--green-light); color: var(--green);
      padding: 4px 10px; border-radius: 20px;
      gap: 5px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); display: inline-block;
    }
    .last-updated { font-size: 12px; color: var(--muted); }

    /* LAYOUT */
    .main { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }
    .biz-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .biz-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

    /* METRIC CARDS */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .metric {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .metric-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .metric-val { font-size: 26px; font-weight: 600; color: var(--text); }
    .metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .metric-sub.up { color: var(--green); }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; }

    /* FUNNEL */
    .funnel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .funnel-label { font-size: 12px; color: var(--muted); width: 120px; flex-shrink: 0; }
    .funnel-track { flex: 1; background: var(--bg); border-radius: 4px; height: 24px; overflow: hidden; }
    .funnel-fill {
      height: 100%; border-radius: 4px;
      display: flex; align-items: center; padding-left: 8px;
      font-size: 11px; font-weight: 600;
      transition: width 0.6s ease;
    }
    .funnel-count { font-size: 12px; font-weight: 600; color: var(--text); width: 32px; text-align: right; }

    /* PERIOD TABS */
    .period-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
    .period-tab {
      font-size: 12px; padding: 4px 12px;
      border-radius: 20px; border: 0.5px solid var(--border);
      background: none; color: var(--muted); cursor: pointer;
    }
    .period-tab.active { background: var(--bg); color: var(--text); font-weight: 500; }

    /* CALL LOG */
    .call-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 0.5px solid var(--border);
    }
    .call-row:last-child { border-bottom: none; }
    .call-icon {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .icon-booked { background: var(--green-light); color: var(--green); }
    .icon-inquiry { background: var(--blue-light); color: var(--blue); }
    .icon-missed { background: var(--red-light); color: var(--red); }
    .call-info { flex: 1; min-width: 0; }
    .call-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .call-detail { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .call-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .play-btn {
      font-size: 11px; padding: 4px 10px;
      border: 0.5px solid var(--border); border-radius: 20px;
      background: none; color: var(--muted); cursor: pointer;
      flex-shrink: 0;
    }
    .play-btn:hover { background: var(--bg); }

    /* COST TABLE */
    .cost-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; border-bottom: 0.5px solid var(--border);
      font-size: 13px;
    }
    .cost-row:last-child { border-bottom: none; }
    .cost-label { color: var(--muted); }
    .cost-val { font-weight: 500; }
    .cost-total {
      display: flex; justify-content: space-between;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid rgba(0,0,0,0.15);
      font-size: 14px; font-weight: 600;
    }

    /* OUTCOME BADGES */
    .badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; flex-shrink: 0;
    }
    .badge-booked { background: var(--green-light); color: var(--green); }
    .badge-inquiry { background: var(--blue-light); color: var(--blue); }
    .badge-missed { background: var(--red-light); color: var(--red); }

    /* LOADING / ERROR */
    .loading {
      text-align: center; padding: 40px;
      font-size: 13px; color: var(--muted);
    }
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TRANSCRIPT MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius);
      padding: 24px; width: 90%; max-width: 560px;
      max-height: 80vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
    .transcript-bubble { font-size: 13px; line-height: 1.6; background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
    .transcript-speaker { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    audio { width: 100%; margin-bottom: 16px; border-radius: var(--radius-sm); }
  </style>
</head>
<body>

<!-- ==========================================
  CONFIGURATION — FILL THESE IN
  ========================================== -->
<script>
  const CONFIG = {
    AIRTABLE_API_KEY: 'patpjrHQUVGSGav2I.be8c8662c6cb0166cf00e359bf9defb2fb6bcd299304702f085c48c94b3cfeaa',
    AIRTABLE_BASE_ID: 'appzIxDs4ELOKZrn9',
    // Retell AI cost per minute (check your plan)
    RETELL_COST_PER_MIN: 0.15,
    // Your monthly tool costs
    MONTHLY_COSTS: {
      'Cal.com': 12.00,
      'Make.com': 9.00,
      'GHL': 15.00,
    }
  };
</script>

<div class="header">
  <div class="header-left">
    <div class="logo">AI<span>Receptionist</span></div>
    <select class="client-select" id="clientSelect" onchange="loadClient(this.value)">
      <option value="">Loading clients...</option>
    </select>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="last-updated" id="lastUpdated">—</span>
    <span class="live-badge"><span class="live-dot"></span>Live</span>
  </div>
</div>

<div class="main">
  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    Loading dashboard...
  </div>

  <div id="dashContent" style="display:none;">
    <div class="biz-title" id="bizTitle">—</div>
    <div class="biz-sub" id="bizSub">—</div>

    <!-- METRICS -->
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Calls answered</div>
        <div class="metric-val" id="metCalls">—</div>
        <div class="metric-sub" id="metCallsSub">this month</div>
      </div>
      <div class="metric">
        <div class="metric-label">Appointments booked</div>
        <div class="metric-val" id="metBooked">—</div>
        <div class="metric-sub up" id="metBookedSub">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Jobs completed</div>
        <div class="metric-val" id="metJobs">—</div>
        <div class="metric-sub" id="metJobsSub">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">AI usage cost</div>
        <div class="metric-val" id="metCost">—</div>
        <div class="metric-sub">this month</div>
      </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="grid-2">
      <!-- CALL VOLUME CHART -->
      <div class="card">
        <div class="card-title">Call volume</div>
        <div class="period-tabs">
          <button class="period-tab active" onclick="switchPeriod('weekly', this)">Weekly</button>
          <button class="period-tab" onclick="switchPeriod('monthly', this)">Monthly</button>
        </div>
        <canvas id="callChart" height="160"></canvas>
      </div>

      <!-- FUNNEL -->
      <div class="card">
        <div class="card-title">Conversion funnel</div>
        <div id="funnelContainer"></div>
      </div>
    </div>

    <!-- COST + CALLS ROW -->
    <div class="grid-2">
      <!-- COST BREAKDOWN -->
      <div class="card">
        <div class="card-title">Usage &amp; cost this month</div>
        <div id="costBreakdown"></div>
      </div>

      <!-- RECENT CALLS -->
      <div class="card">
        <div class="card-title">Recent calls</div>
        <div id="callLog"></div>
      </div>
    </div>
  </div>
</div>

<!-- TRANSCRIPT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Call transcript</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  let allCalls = [];
  let allJobs  = [];
  let clients  = [];
  let currentClient = '';
  let callChart = null;

  // ── Airtable fetch helper ──────────────────────────────
  async function airtableFetch(table, filterFormula = '') {
    const base = CONFIG.AIRTABLE_BASE_ID;
    const key  = CONFIG.AIRTABLE_API_KEY;
    let url = `https://api.airtable.com/v0/${base}/${encodeURIComponent(table)}?pageSize=100`;
    if (filterFormula) url += `&filterByFormula=${encodeURIComponent(filterFormula)}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${key}` } });
    if (!res.ok) throw new Error(`Airtable error: ${res.status}`);
    const data = await res.json();
    return data.records.map(r => ({ id: r.id, ...r.fields }));
  }

  // ── Init ───────────────────────────────────────────────
  async function init() {
    try {
      clients  = await airtableFetch('Clients');
      allCalls = await airtableFetch('Calls');
      allJobs  = await airtableFetch('Jobs');

      const select = document.getElementById('clientSelect');
      select.innerHTML = clients.map(c =>
        `<option value="${c.client_name}">${c.client_name}</option>`
      ).join('');

      if (clients.length > 0) loadClient(clients[0].client_name);
    } catch (e) {
      document.getElementById('loadingState').innerHTML =
        `<div style="color:#A32D2D;font-size:13px;">Error loading data: ${e.message}<br><small>Check your API key and Base ID in CONFIG.</small></div>`;
    }
  }

  // ── Load a client ──────────────────────────────────────
  function loadClient(clientName) {
    currentClient = clientName;
    const clientInfo = clients.find(c => c.client_name === clientName) || {};
    const calls = allCalls.filter(c => c.client === clientName);
    const jobs  = allJobs.filter(j => j.client === clientName);

    // Filter to current month
    const now = new Date();
    const monthCalls = calls.filter(c => {
      if (!c.timestamp) return false;
      const d = new Date(c.timestamp);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });

    document.getElementById('loadingState').style.display  = 'none';
    document.getElementById('dashContent').style.display   = 'block';
    document.getElementById('bizTitle').textContent = clientName || '—';
    document.getElementById('bizSub').textContent =
      `${clientInfo.business_type || 'Business'} · AI Receptionist Dashboard · ${now.toLocaleString('default',{month:'long'})} ${now.getFullYear()}`;
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    // Metrics
    const booked   = monthCalls.filter(c => c.outcome === 'Booked').length;
    const total    = monthCalls.length;
    const bookRate = total > 0 ? Math.round((booked / total) * 100) : 0;
    const monthJobs = jobs.filter(j => {
      if (!j.completed_date) return false;
      const d = new Date(j.completed_date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    const completionRate = booked > 0 ? Math.round((monthJobs.length / booked) * 100) : 0;
    const aiCost = monthCalls.reduce((sum, c) => sum + (parseFloat(c.cost_usd) || 0), 0);

    document.getElementById('metCalls').textContent  = total;
    document.getElementById('metBooked').textContent = booked;
    document.getElementById('metBookedSub').textContent = `${bookRate}% book rate`;
    document.getElementById('metJobs').textContent   = monthJobs.length;
    document.getElementById('metJobsSub').textContent = `${completionRate}% completion`;
    document.getElementById('metCost').textContent   = '$' + aiCost.toFixed(2);

    renderFunnel(total, booked, monthJobs.length);
    renderCostBreakdown(aiCost);
    renderCallLog(calls.slice().reverse().slice(0, 8));
    renderChart(calls, 'weekly');
  }

  // ── Funnel ─────────────────────────────────────────────
  function renderFunnel(total, booked, completed) {
    const rows = [
      { label: 'Calls answered', val: total,     pct: 100,  color: '#B5D4F4', text: '#0C447C' },
      { label: 'Appts booked',   val: booked,    pct: total > 0 ? Math.round(booked/total*100) : 0,    color: '#9FE1CB', text: '#085041' },
      { label: 'Jobs completed', val: completed, pct: total > 0 ? Math.round(completed/total*100) : 0, color: '#C0DD97', text: '#27500A' },
    ];
    document.getElementById('funnelContainer').innerHTML = rows.map(r => `
      <div class="funnel-row">
        <div class="funnel-label">${r.label}</div>
        <div class="funnel-track">
          <div class="funnel-fill" style="width:${r.pct}%;background:${r.color};color:${r.text};">${r.val}</div>
        </div>
        <div class="funnel-count">${r.val}</div>
      </div>`).join('');
  }

  // ── Cost breakdown ─────────────────────────────────────
  function renderCostBreakdown(aiCost) {
    const extras = CONFIG.MONTHLY_COSTS;
    let rows = `<div class="cost-row"><span class="cost-label">Retell AI (call minutes)</span><span class="cost-val">$${aiCost.toFixed(2)}</span></div>`;
    let total = aiCost;
    for (const [name, cost] of Object.entries(extras)) {
      rows += `<div class="cost-row"><span class="cost-label">${name}</span><span class="cost-val">$${cost.toFixed(2)}</span></div>`;
      total += cost;
    }
    document.getElementById('costBreakdown').innerHTML =
      rows + `<div class="cost-total"><span>Total billed</span><span>$${total.toFixed(2)}</span></div>`;
  }

  // ── Call log ───────────────────────────────────────────
  function renderCallLog(calls) {
    if (calls.length === 0) {
      document.getElementById('callLog').innerHTML = '<div style="font-size:13px;color:var(--muted);padding:8px 0;">No calls yet.</div>';
      return;
    }
    document.getElementById('callLog').innerHTML = calls.map((c, i) => {
      const outcome  = c.outcome || 'Inquiry';
      const iconClass = outcome === 'Booked' ? 'icon-booked' : outcome === 'Missed' ? 'icon-missed' : 'icon-inquiry';
      const icon      = outcome === 'Booked' ? '✓' : outcome === 'Missed' ? '✗' : 'i';
      const badgeClass = outcome === 'Booked' ? 'badge-booked' : outcome === 'Missed' ? 'badge-missed' : 'badge-inquiry';
      const name = c.caller_name || 'Unknown caller';
      const service = c.service_requested || 'General inquiry';
      const dur = c.duration_seconds ? Math.round(c.duration_seconds / 60) + ' min' : '';
      const ts  = c.timestamp ? new Date(c.timestamp).toLocaleDateString() : '';
      const hasAudio = !!c.recording_url;
      const hasTrans = !!c.transcript;
      return `
        <div class="call-row">
          <div class="call-icon ${iconClass}">${icon}</div>
          <div class="call-info">
            <div class="call-name">${name} — ${service}</div>
            <div class="call-detail">${ts}${dur ? ' · ' + dur : ''}</div>
          </div>
          <span class="badge ${badgeClass}">${outcome}</span>
          ${(hasAudio || hasTrans) ? `<button class="play-btn" onclick="openModal(${i})">▶ View</button>` : ''}
        </div>`;
    }).join('');

    // Store calls for modal access
    window._recentCalls = calls;
  }

  // ── Chart ──────────────────────────────────────────────
  function renderChart(calls, period) {
    const ctx = document.getElementById('callChart').getContext('2d');
    if (callChart) callChart.destroy();

    let labels = [], data = [];

    if (period === 'weekly') {
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      labels = days;
      data = days.map((_, i) => calls.filter(c => {
        if (!c.timestamp) return false;
        return new Date(c.timestamp).getDay() === i;
      }).length);
    } else {
      // Last 6 months
      for (let i = 5; i >= 0; i--) {
        const d = new Date();
        d.setMonth(d.getMonth() - i);
        labels.push(d.toLocaleString('default', { month: 'short' }));
        data.push(calls.filter(c => {
          if (!c.timestamp) return false;
          const cd = new Date(c.timestamp);
          return cd.getMonth() === d.getMonth() && cd.getFullYear() === d.getFullYear();
        }).length);
      }
    }

    callChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data,
          backgroundColor: '#B5D4F4',
          borderColor: '#378ADD',
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' } },
          x: { ticks: { font: { size: 11 } }, grid: { display: false } }
        }
      }
    });
  }

  function switchPeriod(period, btn) {
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const calls = allCalls.filter(c => c.client === currentClient);
    renderChart(calls, period);
  }

  // ── Modal ──────────────────────────────────────────────
  function openModal(idx) {
    const call = window._recentCalls[idx];
    if (!call) return;
    document.getElementById('modalTitle').textContent =
      (call.caller_name || 'Unknown') + ' — ' + (call.service_requested || 'Call');
    let body = '';
    if (call.recording_url) {
      body += `<audio controls src="${call.recording_url}"></audio>`;
    }
    if (call.transcript) {
      // Try to render line-by-line if transcript has speaker labels
      const lines = call.transcript.split('\n').filter(Boolean);
      body += lines.map(line => {
        const parts = line.match(/^(AI|Agent|Caller|Customer|.*?):\s*(.+)$/i);
        if (parts) return `<div class="transcript-bubble"><div class="transcript-speaker">${parts[1]}</div>${parts[2]}</div>`;
        return `<div class="transcript-bubble">${line}</div>`;
      }).join('');
    } else {
      body += '<p style="font-size:13px;color:var(--muted);">No transcript available.</p>';
    }
    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Start ──────────────────────────────────────────────
  init();

  // Auto-refresh every 5 minutes
  setInterval(() => {
    if (currentClient) loadClient(currentClient);
  }, 5 * 60 * 1000);
</script>
</body>
</html>
